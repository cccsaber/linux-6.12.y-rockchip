name: Package linux-6.12.y-rockchip FnNAS bundle

on:
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: "Full kernel source used as the CI build base"
        required: false
        default: "https://github.com/cccsaber/linux-6.12.y.git"
      upstream_ref:
        description: "Git ref to clone from the build base repo"
        required: false
        default: "main"
      fnnas_repo:
        description: "FnNAS repo used to reuse matching boot initrd when available"
        required: false
        default: "ophub/fnnas"

concurrency:
  group: package-linux-6.12.y-rockchip-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euxo pipefail
          sudo -E apt-get -y update
          sudo -E apt-get -y install \
            bc \
            binutils-aarch64-linux-gnu \
            bison \
            build-essential \
            busybox-static \
            ccache \
            cpio \
            device-tree-compiler \
            dwarves \
            file \
            flex \
            gcc-aarch64-linux-gnu \
            git \
            kmod \
            libelf-dev \
            libssl-dev \
            make \
            python3 \
            rsync \
            u-boot-tools \
            xz-utils

      - name: Package FnNAS-style kernel bundle
        id: package
        env:
          ARCH: arm64
          CROSS_COMPILE: aarch64-linux-gnu-
          BUILD_DIR: ${{ runner.temp }}/linux-full
          OUT_DIR: ${{ runner.temp }}/out/arm64
          STAGE_DIR: ${{ runner.temp }}/fnnas-kernel
          ARTIFACT_DIR: ${{ runner.temp }}/artifacts
          PLATFORM: rockchip
          UPSTREAM_REPO_INPUT: ${{ github.event.inputs.upstream_repo }}
          UPSTREAM_REF_INPUT: ${{ github.event.inputs.upstream_ref }}
          FNNAS_REPO_INPUT: ${{ github.event.inputs.fnnas_repo }}
        run: |
          set -euxo pipefail
          shopt -s nullglob

          # This workflow produces a FnNAS bundle and may reuse reference
          # release assets when an exact package match already exists.
          platform="$PLATFORM"
          repo="${UPSTREAM_REPO_INPUT:-https://github.com/cccsaber/linux-6.12.y.git}"
          ref="${UPSTREAM_REF_INPUT:-main}"
          fnnas_repo="${FNNAS_REPO_INPUT:-ophub/fnnas}"

          rm -rf "$BUILD_DIR" "$OUT_DIR" "$STAGE_DIR" "$ARTIFACT_DIR"
          mkdir -p "$OUT_DIR" "$STAGE_DIR" "$ARTIFACT_DIR"

          if [ -n "$ref" ]; then
            git clone --depth=1 --branch "$ref" "$repo" "$BUILD_DIR"
          else
            git clone --depth=1 "$repo" "$BUILD_DIR"
          fi

          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'linux-full/' \
            --exclude 'out/' \
            --exclude 'fnnas/' \
            "$GITHUB_WORKSPACE/" "$BUILD_DIR/"

          config_args=(
            -e MODULES
            -e BLK_DEV_INITRD
            -e ARCH_ROCKCHIP
            -e ROCKCHIP_IOMMU
            -e DRM
            -e DRM_ROCKCHIP
            -e ROCKCHIP_VOP
            -e ROCKCHIP_VOP2
            -e ROCKCHIP_DW_HDMI
            -e PHY_ROCKCHIP_INNO_HDMI
          )
          dtb_targets=(
            rk3528-armsom-sige1.dtb
            rk3528-hlink-h28k.dtb
            rk3528-nanopi-zero2.dtb
            rk3528-radxa-e20c.dtb
            rk3528-radxa-e24c.dtb
            rk3528-radxa-e24c-dsa.dtb
            rk3528-rock-2a.dtb
            rk3528-rock-2f.dtb
            rk3528-yixun-rs6pro.dtb
          )
          dtb_build_targets=("${dtb_targets[@]/#/rockchip/}")
          dtb_source_dir="$OUT_DIR/arch/arm64/boot/dts/rockchip"

          make -C "$BUILD_DIR" \
            O="$OUT_DIR" \
            ARCH="$ARCH" \
            CROSS_COMPILE="$CROSS_COMPILE" \
            defconfig

          "$BUILD_DIR"/scripts/config --file "$OUT_DIR/.config" \
            --set-str LOCALVERSION "-trim" \
            -d LOCALVERSION_AUTO \
            "${config_args[@]}"

          make -C "$BUILD_DIR" \
            O="$OUT_DIR" \
            ARCH="$ARCH" \
            CROSS_COMPILE="$CROSS_COMPILE" \
            olddefconfig

          make -C "$BUILD_DIR" \
            O="$OUT_DIR" \
            ARCH="$ARCH" \
            CROSS_COMPILE="$CROSS_COMPILE" \
            prepare modules_prepare

          KERNEL_RELEASE="$(make -s -C "$BUILD_DIR" O="$OUT_DIR" ARCH="$ARCH" CROSS_COMPILE="$CROSS_COMPILE" kernelrelease)"
          KERNEL_BASE="${KERNEL_RELEASE%%-*}"
          PACKAGE_NAME="${KERNEL_BASE}-${platform}"
          PACKAGE_PATH="$ARTIFACT_DIR/${PACKAGE_NAME}.tar.gz"
          REPORT_DIR="$ARTIFACT_DIR/${PACKAGE_NAME}-report"
          BUNDLE_PATH="$RUNNER_TEMP/${PACKAGE_NAME}.tar.gz"
          MODULES_ROOT="$STAGE_DIR/modules-root"
          BOOT_STAGE="$STAGE_DIR/boot"
          DTB_STAGE="$STAGE_DIR/dtb"
          MODULES_STAGE="$STAGE_DIR/modules"
          HEADERS_STAGE="$STAGE_DIR/headers"
          REFERENCE_DIR="$STAGE_DIR/reference"
          INITRD_ROOT="$STAGE_DIR/initrd"
          INITRD_MODULES_ROOT="$INITRD_ROOT/lib/modules/$KERNEL_RELEASE"
          MODULES_INSTALL_ROOT="$MODULES_ROOT/lib/modules/$KERNEL_RELEASE"
          HEADERS_UAPI_STAGE="$STAGE_DIR/headers-uapi"
          INITRD_SOURCE="generated"
          RELEASE_READY="false"
          REF_MODULES_TAR=""
          REF_HEADER_TAR=""

          rm -rf "$PACKAGE_PATH" "$REPORT_DIR" "$BUNDLE_PATH"
          mkdir -p \
            "$REPORT_DIR" \
            "$MODULES_ROOT" \
            "$BOOT_STAGE" \
            "$DTB_STAGE" \
            "$MODULES_STAGE" \
            "$HEADERS_STAGE" \
            "$REFERENCE_DIR" \
            "$INITRD_ROOT" \
            "$HEADERS_UAPI_STAGE"

          make -C "$BUILD_DIR" \
            O="$OUT_DIR" \
            ARCH="$ARCH" \
            CROSS_COMPILE="$CROSS_COMPILE" \
            -j"$(nproc)" \
            W=1 \
            drivers/phy/rockchip/phy-rockchip-inno-hdmi.o \
            drivers/gpu/drm/rockchip/dw_hdmi-rockchip.o \
            2>&1 | tee "$REPORT_DIR/obj-build.log"

          make -C "$BUILD_DIR" \
            O="$OUT_DIR" \
            ARCH="$ARCH" \
            CROSS_COMPILE="$CROSS_COMPILE" \
            -j"$(nproc)" \
            W=1 \
            Image \
            modules \
            "${dtb_build_targets[@]}" \
            2>&1 | tee "$REPORT_DIR/full-build.log"

          make -C "$BUILD_DIR" \
            O="$OUT_DIR" \
            ARCH="$ARCH" \
            CROSS_COMPILE="$CROSS_COMPILE" \
            INSTALL_MOD_PATH="$MODULES_ROOT" \
            modules_install \
            2>&1 | tee "$REPORT_DIR/modules-install.log"

          make -C "$BUILD_DIR" \
            O="$OUT_DIR" \
            ARCH="$ARCH" \
            CROSS_COMPILE="$CROSS_COMPILE" \
            INSTALL_HDR_PATH="$HEADERS_UAPI_STAGE" \
            headers_install \
            2>&1 | tee "$REPORT_DIR/headers-install.log"

          if [ -x "$MODULES_INSTALL_ROOT/build/scripts/mod/modinfo" ]; then
            "$MODULES_INSTALL_ROOT/build/scripts/mod/modinfo" -F filename 2>/dev/null >/dev/null || true
          fi

          for dtb in "${dtb_targets[@]}"; do
            cp "$dtb_source_dir/$dtb" "$DTB_STAGE/"
          done

          cp "$OUT_DIR/arch/arm64/boot/Image" "$BOOT_STAGE/vmlinuz-$KERNEL_RELEASE"
          cp "$OUT_DIR/System.map" "$BOOT_STAGE/System.map-$KERNEL_RELEASE"
          cp "$OUT_DIR/.config" "$BOOT_STAGE/config-$KERNEL_RELEASE"

          if curl -fsSL \
            "https://github.com/${fnnas_repo}/releases/download/kernel_fnnas/${PACKAGE_NAME}.tar.gz" \
            -o "$REFERENCE_DIR/${PACKAGE_NAME}.tar.gz"; then
            mkdir -p "$REFERENCE_DIR/extracted"
            tar -xzf "$REFERENCE_DIR/${PACKAGE_NAME}.tar.gz" -C "$REFERENCE_DIR/extracted"
            ref_root="$REFERENCE_DIR/extracted"
            if [ -d "$ref_root/$PACKAGE_NAME" ]; then
              ref_root="$ref_root/$PACKAGE_NAME"
            fi
            ref_boot=("$ref_root"/boot-"$platform"-*.tar.gz)
            ref_modules=("$ref_root"/modules-"$platform"-*.tar.gz)
            ref_header=("$ref_root"/header-"$platform"-*.tar.gz)
            if [ "${#ref_modules[@]}" -gt 0 ]; then
              REF_MODULES_TAR="${ref_modules[0]}"
            fi
            if [ "${#ref_header[@]}" -gt 0 ]; then
              REF_HEADER_TAR="${ref_header[0]}"
            fi
            if [ "${#ref_boot[@]}" -gt 0 ]; then
              mkdir -p "$REFERENCE_DIR/boot"
              tar -xzf "${ref_boot[0]}" -C "$REFERENCE_DIR/boot"
              ref_initrd=("$REFERENCE_DIR/boot"/initrd.img-*)
              ref_uinitrd=("$REFERENCE_DIR/boot"/uInitrd-*)
              if [ "${#ref_initrd[@]}" -gt 0 ] && [ "${#ref_uinitrd[@]}" -gt 0 ]; then
                cp "${ref_initrd[0]}" "$BOOT_STAGE/initrd.img-$KERNEL_RELEASE"
                cp "${ref_uinitrd[0]}" "$BOOT_STAGE/uInitrd-$KERNEL_RELEASE"
                INITRD_SOURCE="reference"
              fi
            fi
          fi

          if [ "$INITRD_SOURCE" = "reference" ] && [ -n "$REF_MODULES_TAR" ] && [ -n "$REF_HEADER_TAR" ]; then
            RELEASE_READY="true"
          fi

          if [ "$INITRD_SOURCE" != "reference" ]; then
            mkdir -p "$STAGE_DIR/initrd"/{bin,dev,proc,sys,newroot}
            cp "$(command -v busybox)" "$STAGE_DIR/initrd/bin/busybox"
            ln -sf busybox "$STAGE_DIR/initrd/bin/sh"
            printf '%s\n' \
              '#!/bin/sh' \
              'mount -t proc proc /proc' \
              'mount -t sysfs sysfs /sys' \
              'echo "FnNAS placeholder initramfs for recovery/debug only"' \
              'exec /bin/sh' \
              > "$STAGE_DIR/initrd/init"
            chmod +x "$STAGE_DIR/initrd/init"
            (
              cd "$STAGE_DIR/initrd"
              find . -print0 | cpio --null -o --format=newc | gzip -9 > "$BOOT_STAGE/initrd.img-$KERNEL_RELEASE"
            )
            mkimage \
              -A arm64 \
              -O linux \
              -T ramdisk \
              -C gzip \
              -n uInitrd \
              -d "$BOOT_STAGE/initrd.img-$KERNEL_RELEASE" \
              "$BOOT_STAGE/uInitrd-$KERNEL_RELEASE"
          fi

          if [ -n "$REF_MODULES_TAR" ]; then
            tar -xzf "$REF_MODULES_TAR" -C "$MODULES_STAGE"
          else
            printf '%s\n' \
              "No exact modules bundle was found in ${fnnas_repo}/releases/tag/kernel_fnnas for ${PACKAGE_NAME}." \
              "This workflow now builds Image + DTBs + RK3528 HDMI objects and reuses a previous modules package when available." \
              > "$REPORT_DIR/modules-note.txt"
            mkdir -p "$MODULES_STAGE/$KERNEL_RELEASE"
          fi

          if [ -n "$REF_HEADER_TAR" ]; then
            tar -xzf "$REF_HEADER_TAR" -C "$HEADERS_STAGE"
          else
            printf '%s\n' \
              "No exact headers bundle was found in ${fnnas_repo}/releases/tag/kernel_fnnas for ${PACKAGE_NAME}." \
              "A minimal headers package will be generated from this source tree for inspection only." \
              > "$REPORT_DIR/header-note.txt"
            mkdir -p \
              "$HEADERS_STAGE/scripts" \
              "$HEADERS_STAGE/include" \
              "$HEADERS_STAGE/arch/arm64/include"
            rsync -a "$BUILD_DIR/Makefile" "$HEADERS_STAGE/"
            rsync -a "$BUILD_DIR/Kconfig" "$HEADERS_STAGE/"
            rsync -a "$BUILD_DIR/scripts/" "$HEADERS_STAGE/scripts/"
            rsync -a "$BUILD_DIR/include/" "$HEADERS_STAGE/include/"
            rsync -a --exclude 'boot/' "$BUILD_DIR/arch/arm64/" "$HEADERS_STAGE/arch/arm64/"
            cp "$OUT_DIR/.config" "$HEADERS_STAGE/.config"
            if [ -f "$OUT_DIR/Module.symvers" ]; then
              cp "$OUT_DIR/Module.symvers" "$HEADERS_STAGE/Module.symvers"
            else
              : > "$HEADERS_STAGE/Module.symvers"
            fi
            cp "$OUT_DIR/System.map" "$HEADERS_STAGE/System.map"
            rsync -a "$OUT_DIR/include/" "$HEADERS_STAGE/include/"
            rsync -a "$OUT_DIR/arch/arm64/include/" "$HEADERS_STAGE/arch/arm64/include/"
            rsync -a "$OUT_DIR/scripts/" "$HEADERS_STAGE/scripts/"
          fi

          cp "$OUT_DIR/.config" "$REPORT_DIR/kernel.config"
          printf '%s\n' "$KERNEL_RELEASE" > "$REPORT_DIR/kernelrelease.txt"
          printf '%s\n' "$KERNEL_BASE" > "$REPORT_DIR/kernel-base.txt"
          printf '%s\n' "$PACKAGE_NAME" > "$REPORT_DIR/package-name.txt"
          printf '%s\n' "$INITRD_SOURCE" > "$REPORT_DIR/initrd-source.txt"
          printf '%s\n' "$RELEASE_READY" > "$REPORT_DIR/release-ready.txt"
          printf '%s\n' "$fnnas_repo" > "$REPORT_DIR/reference-repo.txt"
          cp "$OUT_DIR/drivers/phy/rockchip/phy-rockchip-inno-hdmi.o" "$REPORT_DIR/"
          cp "$OUT_DIR/drivers/gpu/drm/rockchip/dw_hdmi-rockchip.o" "$REPORT_DIR/"
          if [ "$RELEASE_READY" != "true" ]; then
            printf '%s\n' \
              "No exact boot bundle was found in ${fnnas_repo}/releases/tag/kernel_fnnas for ${PACKAGE_NAME}." \
              "This run generated a placeholder initrd/uInitrd, so the result stays as a workflow artifact only." \
              > "$REPORT_DIR/release-note.txt"
          fi

          (
            cd "$BOOT_STAGE"
            tar -czf "$STAGE_DIR/boot-$platform-$KERNEL_RELEASE.tar.gz" *
          )
          (
            cd "$DTB_STAGE"
            tar -czf "$STAGE_DIR/dtb-$platform-$KERNEL_RELEASE.tar.gz" *
          )
          (
            cd "$MODULES_STAGE"
            tar -czf "$STAGE_DIR/modules-$platform-$KERNEL_RELEASE.tar.gz" *
          )
          (
            cd "$HEADERS_STAGE"
            tar -czf "$STAGE_DIR/header-$platform-$KERNEL_RELEASE.tar.gz" *
          )

          (
            cd "$STAGE_DIR"
            sha256sum \
              "boot-$platform-$KERNEL_RELEASE.tar.gz" \
              "dtb-$platform-$KERNEL_RELEASE.tar.gz" \
              "modules-$platform-$KERNEL_RELEASE.tar.gz" \
              "header-$platform-$KERNEL_RELEASE.tar.gz" \
              > sha256sums
            tar -czf "$PACKAGE_PATH" \
              "boot-$platform-$KERNEL_RELEASE.tar.gz" \
              "dtb-$platform-$KERNEL_RELEASE.tar.gz" \
              "modules-$platform-$KERNEL_RELEASE.tar.gz" \
              "header-$platform-$KERNEL_RELEASE.tar.gz" \
              sha256sums
          )

          cp "$PACKAGE_PATH" "$BUNDLE_PATH"

          {
            echo "bundle_name=$PACKAGE_NAME"
            echo "bundle_path=$BUNDLE_PATH"
            echo "package_path=$PACKAGE_PATH"
            echo "report_dir=$REPORT_DIR"
            echo "artifact_dir=$ARTIFACT_DIR"
            echo "kernel_release=$KERNEL_RELEASE"
            echo "initrd_source=$INITRD_SOURCE"
            echo "release_ready=$RELEASE_READY"
          } >> "$GITHUB_OUTPUT"

      - name: Upload kernel bundle to release
        if: ${{ !cancelled() && steps.package.outcome == 'success' }}
        uses: ncipollo/release-action@main
        with:
          tag: kernel_fnnas
          artifacts: ${{ steps.package.outputs.bundle_path }}
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: false
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            - FnNAS-style kernel bundle packaged from `linux-6.12.y-rockchip`.
            - This workflow may reuse matching reference bundle assets when available.
            - Use this repository as `kernel_repo` in FnNAS tooling when consuming `${{ steps.package.outputs.bundle_name }}`.

      - name: Upload build artifacts
        if: ${{ always() && steps.package.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.bundle_name || 'linux-6.12.y-rockchip' }}
          if-no-files-found: warn
          retention-days: 7
          path: ${{ steps.package.outputs.package_path }}
